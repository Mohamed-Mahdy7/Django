{% extends 'base.html' %}
{% load static %}
{% block title %} Trainee List {% endblock %}

{% block style %}
    <link rel="stylesheet" href="{% static 'trainee/css/main.css' %}">
{% endblock %}

{% block body %}
    <main>
        <h1>Trinee List</h1>
        <table>
            <thead>
                <tr>
                    <th colspan="2">students</th>
                </tr>
            </thead>
            <tbody>
                {% for student in students %}
                <tr>
                    <td>{{ student.id }}</td>
                    <td>{{ student.name }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
{% endblock %}

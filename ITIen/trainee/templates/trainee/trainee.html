{% extends 'base.html' %}
{% load static %}
{% block title %} Trainee List {% endblock %}

{% block style %}
    <link rel="stylesheet" href="{% static 'trainee/css/main.css' %}">
    <link rel="stylesheet" href="{% static 'trainee/css/list.css' %}">
{% endblock %}

{% block body %}
    <main>
        <h1>Trinee List</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Course</th>

                </tr>
            </thead>
            <tbody>
                {% for trainee in trainees %}
                <tr>
                    <td>{{ trainee.ID }}</td>
                    <td>
                        <a href="{% url 'Trainee_Details' trainee.ID %}" >{{ trainee.name }}</a>
                    </td>
                    <td>
                        {{ trainee.course_id }}
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="add/">
            <button type="button">Add</button>
        </a>
    </main>
{% endblock %}

{% extends 'trainee/trainee.html' %}
{% block title %} Trainee Add {% endblock %}
{% block body %}
    <form method="POST", enctype="multipart/form-data">
        {% csrf_token %}
        <h1>Add Trainee</h1>
        {% for field in form %}
            <div class="form">
                    {{ field.label }}:
                    {{ field }}
                    {{ field.errors }}
            </div>
        {% endfor %}
        <button type="submit">Add</button>
        
    </form>
{% endblock %}

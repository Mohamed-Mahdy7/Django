{% extends 'trainee/trainee.html' %}
{% block title %} Trainee Details {% endblock %}
{% block body %}
    <main>
        <h1>{{ student.name }}</h1>
        <table>
            <thead>
                <tr>
                    <th colspan="2">student</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>ID</td>
                    <td>{{ student.ID }}</td>
                </tr>
                <tr>
                    <td>Name</td>
                    <td>{{ student.name }}</td>
                </tr>
                <tr>
                    <td>Code</td>
                    <td>{{ student.age }}</td>
                </tr>
                <tr>
                    <td>Track</td>
                    <td>{{ student.degree }}</td>
                </tr>
            </tbody>
        </table>
        <div class="buttons">
            <a href="{% url 'Trainee_update' student.ID %}">
                <button type="button">Update</button>
            </a>
            <a href="{% url 'Trainee_delete' student.ID %}">
                <button type="button">Delete</button>
            </a>
        </div>
    </main>
{% endblock %}

{% extends 'base.html' %}
{% load static %}

{% block title %} Course List {% endblock %}

{% block style %}
    <link rel="stylesheet" href="{% static 'course/css/main.css' %}">
{% endblock %}

{% block body %}
    <main>
        <h1>Courses List</h1>
        <table>
            <thead>
                <tr>
                    <th colspan="2">course</th>
                </tr>
            </thead>
            <tbody>
                {% for course in courses %}
                    <tr>
                        <td>{{ course.id }}</td>
                        <td>{{ course.name }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </main>
{% endblock %}

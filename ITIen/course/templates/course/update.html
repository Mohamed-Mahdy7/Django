{% extends 'base.html' %}
{% block title %} Course Update {% endblock %}

{% block body %}
    <h1>Update Course</h1>
    <form action="/course/">
        <div>
            <label for="name"></label>
            <input type="text" id="name" placeholder="Enter name to update" required>
        </div>
        <button type="submit">Update</button>
    </form>
{% endblock %}

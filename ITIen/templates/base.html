{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'ITIen/css/main.css' %}">
    {% block style %} {% endblock %}
</head>
<body>
    {% block nav %}
    <nav>
        {% if user.is_authenticated %}
        <ul>
                <li>
                    <a href="/">Home</a>
                </li>
            </ul>
            <ul>
                <li>
                    <a href="/trainee/">Trainee</a>
                </li>
            </ul>
            <ul>
                <li>
                    <a href="/course/">Course</a>
                </li>
            </ul>
            <ul>
                <form class="logout-form" method="POST" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="logout" type="submit">Logout</button>
                </form>
            </ul>
        {% else %}
            <ul>
                <li>
                    <a href="{% url 'login' %}">Login</a>
                </li>
            </ul>
            <ul>
                <li>
                    <a href="{% url 'register' %}">Register</a>
                </li>
            </ul>
        {% endif %}
    </nav>
    {% endblock %}
    {% block body %}
    <header>
        <h1 style="font-size: 100px;">ITIen</h1>
    </header>
    {% endblock %}
</body>
</html>
